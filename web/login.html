<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tally -- Sign In</title>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="view-transition" content="same-origin">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #171717;
      --text-secondary: #737373;
      --border: #e5e5e5;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #171717;
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --border: #262626;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.3s, color 0.3s;
    }

    .card {
      width: 100%;
      max-width: 400px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: var(--text-secondary);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .theme-toggle:hover { color: var(--text-primary); }
    .theme-toggle svg { width: 18px; height: 18px; }

    .tagline {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--text-primary);
    }

    input::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
    }

    button[type="submit"]:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    #error-msg {
      display: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #e05252;
      font-size: 0.8125rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
    }

    #success-msg {
      display: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.8125rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
    }

    .footer-note {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 1.75rem;
    }

    .footer-note a {
      color: var(--text-primary);
      text-decoration: none;
      position: relative;
    }

    .footer-note a::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-primary);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .footer-note a:hover::after { width: 100%; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--bg-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-row">
      <div class="logo">Tally</div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
    <div class="tagline">Check your cheques without the bureaucracy.</div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">BCEID Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="your.username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>

      <button type="submit" id="submit-btn">Sign In</button>

      <div id="error-msg"></div>
      <div id="success-msg">Signed in. Loading your dashboard...</div>
    </form>

    <div class="footer-note">
      <a href="/">Back to home</a> &middot; Not affiliated with the Government of BC.
    </div>
  </div>

  <script>
    // Theme
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    const getPreferredTheme = () => {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const setTheme = (theme, animate) => {
      const apply = () => {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          document.documentElement.removeAttribute('data-theme');
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
        localStorage.setItem('theme', theme);
      };

      if (animate && document.startViewTransition) {
        document.startViewTransition(apply);
      } else {
        apply();
      }
    };

    setTheme(getPreferredTheme(), false);

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark', true);
    });

    // Login form
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const bodyText = await res.text();
        let data = {};
        if (bodyText) {
          try { data = JSON.parse(bodyText); } catch { data = { error: bodyText.slice(0, 140) }; }
        }

        if (res.ok && data.success) {
          successMsg.style.display = 'block';
          setTimeout(() => { window.location.href = '/app'; }, 800);
        } else {
          const msg = data.error || data.message || 'Invalid credentials. Please try again.';
          errorMsg.textContent = msg;
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please check your connection and try again.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
