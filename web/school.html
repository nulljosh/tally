<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="view-transition" content="same-origin">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Tally -- School</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #171717;
      --text-secondary: #737373;
      --border: #e5e5e5;
      --link: #171717;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #171717;
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --border: #262626;
      --link: #fafafa;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
    }

    header { margin-bottom: 2rem; }

    header .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    h1 a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: var(--text-secondary);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .theme-toggle:hover { color: var(--text-primary); }
    .theme-toggle svg { width: 18px; height: 18px; }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }

    /* Course selector */
    .course-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .course-tab {
      padding: 0.625rem 1rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .course-tab:hover { color: var(--text-primary); }

    .course-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* Overall grade */
    .overall {
      text-align: center;
      padding: 1.5rem 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .overall-grade {
      font-size: clamp(3rem, 10vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .overall-label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    /* Sections */
    section { margin-bottom: 2rem; }

    h2 {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    /* Grade rows */
    .grade-list { list-style: none; }

    .grade-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.9375rem;
    }

    .grade-list li + li {
      border-top: 1px solid var(--border);
    }

    .grade-name {
      color: var(--text-primary);
      font-weight: 400;
    }

    .grade-value {
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .grade-value.high { color: var(--green); }
    .grade-value.mid { color: var(--amber); }
    .grade-value.low { color: var(--red); }
    .grade-value.none { color: var(--text-secondary); font-weight: 400; }

    /* Category header with average */
    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .cat-avg {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: none;
      letter-spacing: 0;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text-primary);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.375rem;
    }

    footer {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      padding: 1rem 0 2rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    footer a:hover { color: var(--text-primary); }

    @media (max-width: 640px) {
      .container { padding: 3rem 1.25rem 2rem; }
    }
  </style>
</head>

      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const setTheme = (theme, animate) => {
      const apply = () => {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          document.documentElement.removeAttribute('data-theme');
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
        localStorage.setItem('theme', theme);
      };
      if (animate && document.startViewTransition) {
        document.startViewTransition(apply);
      } else {
        apply();
      }
    };

    setTheme(getPreferredTheme(), false);

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark', true);

    // Short course names
    function shortName(full) {
      if (full.includes('Pre-Calculus')) return 'Pre-Calculus 12';
      if (full.includes('Anatomy')) return 'Anatomy & Physiology 12';
      return full.split(',')[0];
    }

    function gradeClass(pct) {
      if (pct === null || pct === undefined) return 'none';
      if (pct >= 80) return 'high';
      if (pct >= 60) return 'mid';
      return 'low';
    }

    function formatPct(pct) {
      if (pct === null || pct === undefined) return '--';
      return Math.round(pct) + '%';
    }

    // Count completed items across all categories
    function courseProgress(course) {
      let done = 0, total = 0;
      for (const cat of course.categories) {
        for (const item of cat.items) {
          total++;
          if (item.percentage !== null) done++;
        }
      }
      return { done, total };
    }

    // Render
    const tabsEl = document.getElementById('courseTabs');
    const contentEl = document.getElementById('courseContent');
    const updatedEl = document.getElementById('lastUpdated');

    updatedEl.textContent = new Date(GRADES.retrieved_at).toLocaleDateString('en-CA', {
      year: 'numeric', month: 'short', day: 'numeric'
    });

    let activeCourse = 0;

    function renderTabs() {
      tabsEl.innerHTML = '';
      GRADES.courses.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'course-tab' + (i === activeCourse ? ' active' : '');
        btn.textContent = shortName(c.course);
        btn.addEventListener('click', () => {
          activeCourse = i;
          renderTabs();
          renderCourse(c);
        });
        tabsEl.appendChild(btn);
      });
    }

    function renderCourse(course) {
      const { done, total } = courseProgress(course);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      // Find overall grade if available
      const overallPct = GRADES.overall_grade_pct;
      const overallDisplay = (activeCourse === 1 && overallPct) ? overallPct + '%' : null;

      let html = '';

      // Overall grade (only A&P has it tracked)
      if (overallDisplay) {
        html += `
          <div class="overall">
            <div class="overall-grade">${overallDisplay}</div>
            <div class="overall-label">Overall Grade</div>
          </div>`;
      }

      // Progress bar
      html += `
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">
            <span>${done} of ${total} items complete</span>
            <span>${pct}%</span>
          </div>
        </div>`;

      // Categories
      const skipCategories = ['Course Plan'];
      for (const cat of course.categories) {
        if (skipCategories.includes(cat.category)) continue;
        if (cat.items.length === 0) continue;

        const avgDisplay = cat.grade_pct !== null ? formatPct(cat.grade_pct) : null;

        html += `<section>
          <div class="cat-header">
            <h2>${cat.category}</h2>
            ${avgDisplay ? `<span class="cat-avg">${avgDisplay} avg</span>` : ''}
          </div>
          <ul class="grade-list">`;

        for (const item of cat.items) {
          const cls = gradeClass(item.percentage);
          const val = formatPct(item.percentage);
          html += `<li>
            <span class="grade-name">${item.name}</span>
            <span class="grade-value ${cls}">${val}</span>
          </li>`;
        }

        html += `</ul></section>`;
      }

      contentEl.innerHTML = html;
    }

    // Default to A&P (index 1) if it exists
    activeCourse = GRADES.courses.length > 1 ? 1 : 0;
    renderTabs();
    renderCourse(GRADES.courses[activeCourse]);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
